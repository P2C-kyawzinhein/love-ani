<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret ❤️</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="heart-background"></div>

<audio id="bgMusic" loop>
  <source src="music/Pretty Boy M2M Pretty Girl Male Version REYNE COVER.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <!-- Unlock -->
  <div id="unlockSection">
    <h2>Enter Our Special Date</h2>
    <input type="password" id="password" placeholder="MMDD">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error"></p>
  </div>

  <!-- Title -->
  <div id="secretContent" class="hidden">
    <h1 class="title">5 Years With You ❤️</h1>
    <p>Every year with you has been my favorite chapter.</p>
  </div>

  <!-- ===== MEMORY ===== -->
  <div id="memory" class="section hidden">
  <h2>Our Memory 📸</h2>

  <div class="envelope-container">

    <div class="envelope" onclick="openEnvelope(this, 'images/memory/year1.jpg', '私達の初めての出会いです。何かを感じているけど恋人になりたいと神様に願いしました。 ❤️')">💌</div>
    <div class="envelope" onclick="openEnvelope(this, 'year2.jpg', 'First Christmas 🎄')">💌</div>
    <div class="envelope" onclick="openEnvelope(this, 'year3.jpg', 'We moved in together 🏠')">💌</div>
    <div class="envelope" onclick="openEnvelope(this, 'year4.jpg', 'Our big fight & stronger love 💞')">💌</div>
    <div class="envelope" onclick="openEnvelope(this, 'year5.jpg', '5th Anniversary 👑')">💌</div>

  </div>

</div>

  <!-- ===== PLAYLIST ===== -->
  <div id="playlist" class="section hidden">
    <h2>Our Playlist 🎵</h2>
    <p>ここに好きな曲を入れる</p>
  </div>

  <!-- ===== GLOW ===== -->
  <div id="glow" class="section hidden">
    <h2>Our Glow ✨</h2>
    <p>ここにメッセージ</p>
  </div>

  <!-- ===== FAMILY ===== -->
  <div id="family" class="section hidden">
    <h2>Our Family 👨‍👩‍👧</h2>
    <p>ここに家族写真</p>
  </div>

</div>

<!-- Modal -->
<div id="modal">
  <span id="close">&times;</span>
  <img id="modalImg">
</div>

<!-- Footer（← bodyの中に入れる） -->
<footer class="footer-nav " id="footerNav">
  <div onclick="openSection('memory')">📸 Our Memory</div>
  <div onclick="openSection('playlist')">🎵 Our Playlist</div>
  <div onclick="openSection('glow')">✨ Our Glow</div>
  <div onclick="openSection('family')">👨‍👩‍👧 Our Family</div>
</footer>

<script src="script.js"></script>

</body>
</html>
